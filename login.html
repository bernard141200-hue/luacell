<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Seguro | Lua Cell</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght=400;600;700&family=Nunito:wght=400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-dark: #0f172a; --moon-yellow: #f59e0b; --slate-gray: #64748b;
            --silver: #f1f5f9; --white: #ffffff; --text-main: #1e293b;
        }
        body { 
            background: var(--space-dark); color: var(--text-main); 
            font-family: 'Nunito', sans-serif; display: flex; 
            justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .login-box {
            background: var(--white); padding: 40px; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); width: 100%; max-width: 400px;
            text-align: center;
        }
        .logo { font-size: 42px; font-weight: 700; font-family: 'Fredoka', sans-serif; color: var(--space-dark); margin-bottom: 5px; }
        .logo span { color: var(--moon-yellow); }
        .subtitle { font-size: 15px; font-weight: 600; margin-bottom: 30px; color: var(--slate-gray); }
        .btn-auth {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 16px;
            font-size: 16px; font-weight: 700; border: none; cursor: pointer; transition: 0.2s;
        }
        .btn-google { background: #ffffff; color: #3c4043; border: 1px solid #dadce0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-google:hover { background: #f8f9fa; border-color: #d2d4d7; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

    <div class="login-box">
        <div class="logo">Lua <span>Cell</span></div>
        <div class="subtitle">Acesse de forma rápida e segura</div>
        
        <button class="btn-auth btn-google" onclick="loginComGoogleReal()">
            <svg aria-hidden="true" viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"></path>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
            </svg>
            Entrar com o Gmail
        </button>
    </div>

    <script>
        // MANTENHA AS CHAVES DO SEU FIREBASE AQUI
        const firebaseConfig = {
            apiKey: "AIzaSyBb8tp1UCxmWrsLB9jf5hmtN9jXPU-4Z_k",
            authDomain: "nuvee-store.firebaseapp.com",
            projectId: "nuvee-store",
            storageBucket: "nuvee-store.firebasestorage.app",
            messagingSenderId: "938331536230",
            appId: "1:938331536230:web:f7496d84ad2633509366a7",
            measurementId: "G-FF0Q9RR8RT"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        function loginComGoogleReal() {
            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    let dadosLocais = JSON.parse(sessionStorage.getItem('nuvee_user'));
                    let telefoneSalvo = "Não cadastrado";

                    if (dadosLocais && dadosLocais.email === user.email && dadosLocais.telefone && dadosLocais.telefone !== "Não cadastrado") {
                        telefoneSalvo = dadosLocais.telefone;
                        prosseguirComLogin(user, telefoneSalvo);
                    } else {
                        let infoTel = prompt("Bem-vindo à Lua Cell! 🌙\nPor favor, informe seu WhatsApp com DDD para liberar consultas e pedidos:");
                        if (infoTel) telefoneSalvo = infoTel;
                        prosseguirComLogin(user, telefoneSalvo);
                    }
                })
                .catch((error) => {
                    console.error("Erro no login:", error);
                });
        }

        function prosseguirComLogin(user, telefoneSalvo) {
            let usuario = {
                nome: user.displayName,
                email: user.email,
                foto: user.photoURL || "https://www.w3schools.com/howto/img_avatar2.png",
                telefone: telefoneSalvo
            };

            fetch('/api/clientes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(usuario)
            })
            .then(() => {
                sessionStorage.setItem('nuvee_user', JSON.stringify(usuario));
                window.location.replace("./index.html");
            })
            .catch(() => {
                sessionStorage.setItem('nuvee_user', JSON.stringify(usuario));
                window.location.replace("./index.html");
            });
        }
    </script>
</body>
</html>
