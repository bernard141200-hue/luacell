<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Lua Cell</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght=400;600;700&family=Nunito:wght=400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-dark: #0f172a;
            --moon-yellow: #f59e0b;
            --slate-gray: #64748b;
            --silver: #f1f5f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --accent-blue: #2563eb;
            --success-green: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--silver); color: var(--text-main); font-family: 'Nunito', sans-serif; }
        h1, h2, h3, .logo, .btn, .stat-number { font-family: 'Fredoka', sans-serif; }

        /* Topbar & Header */
        header { 
            background: var(--space-dark); color: var(--white);
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 40px; border-bottom: 3px solid var(--moon-yellow);
        }
        .logo { font-size: 28px; font-weight: 700; color: var(--white); text-decoration: none; }
        .logo span { color: var(--moon-yellow); }
        .admin-badge { background: var(--moon-yellow); color: var(--space-dark); padding: 4px 12px; border-radius: 8px; font-weight: 700; font-size: 12px; text-transform: uppercase; margin-left: 10px; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border-left: 5px solid var(--accent-blue); }
        .stat-card.iphones { border-left-color: var(--moon-yellow); }
        .stat-card.assist { border-left-color: var(--success-green); }
        .stat-title { font-size: 14px; color: var(--slate-gray); font-weight: 600; text-transform: uppercase; }
        .stat-number { font-size: 28px; color: var(--space-dark); margin-top: 5px; }

        /* Main Layout Split */
        .admin-content { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        @media (max-width: 900px) { .admin-content { grid-template-columns: 1fr; } }

        /* Forms & Cards */
        .admin-box { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; }
        .box-title { font-size: 22px; color: var(--space-dark); margin-bottom: 20px; border-bottom: 2px dashed #e2e8f0; padding-bottom: 10px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; font-weight: 700; color: var(--space-dark); margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #cbd5e1; font-family: 'Nunito', sans-serif; font-size: 15px; }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent-blue); outline: none; }

        .btn { display: inline-block; background: var(--accent-blue); color: white; width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; text-align: center; }
        .btn:hover { background: #1d4ed8; }
        .btn-add { background: var(--space-dark); border: 1px solid var(--moon-yellow); color: var(--moon-yellow); }
        .btn-add:hover { background: var(--moon-yellow); color: var(--space-dark); }

        /* Inventory Table */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: var(--space-dark); color: white; padding: 12px; font-size: 14px; }
        td { padding: 15px 12px; border-bottom: 1px solid #e2e8f0; font-size: 15px; }
        tr:hover { background: #f8fafc; }

        .badge-cat { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .cat-iphone { background: #fef3c7; color: #d97706; }
        .cat-acessorio { background: #dbeafe; color: #2563eb; }
        .cat-assist { background: #d1fae5; color: #059669; }

        .actions-cell button { background: none; border: none; color: #ef4444; cursor: pointer; text-decoration: underline; font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center;">
            <a href="/index.html" class="logo">Lua <span>Cell</span></a>
            <span class="admin-badge">Painel de Controle</span>
        </div>
        <a href="/index.html" style="color: white; text-decoration: none; font-weight: 700; font-size: 14px;">Sair do Painel 🚪</a>
    </header>

    <main class="container">
        
        <div class="stats-grid">
            <div class="stat-card iphones">
                <div class="stat-title">iPhones Cadastrados</div>
                <div class="stat-number" id="dash-iphones">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Itens em Acessórios</div>
                <div class="stat-number" id="dash-acessorios">0</div>
            </div>
            <div class="stat-card assist">
                <div class="stat-title">Alertas de Estoque Baixo</div>
                <div class="stat-number" id="dash-alertas" style="color: #ef4444;">0</div>
            </div>
        </div>

        <div class="admin-content">
            
            <div class="admin-box">
                <div class="box-title">Novo Item / Serviço</div>
                <form id="form-produto" onsubmit="salvarNovoProduto(event)">
                    <div class="form-group">
                        <label>Nome do Produto ou Aparelho</label>
                        <input type="text" id="prod-nome" placeholder="Ex: iPhone 14 Pro Max 256GB" required>
                    </div>

                    <div class="form-group">
                        <label>Categoria</label>
                        <select id="prod-categoria" required>
                            <option value="iPhones">iPhones (Venda)</option>
                            <option value="Acessórios">Acessórios em Geral</option>
                            <option value="Assistência">Serviço/Peça Assistência</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Detalhes / Condição</label>
                        <input type="text" id="prod-tamanho" placeholder="Ex: Novo Lacrado, Vitrine 100%, Original" required>
                    </div>

                    <div class="form-group">
                        <label>Quantidade em Estoque</label>
                        <input type="number" id="prod-qtd" min="0" placeholder="Ex: 5" required>
                    </div>

                    <div class="form-group">
                        <label>Preço de Venda (R$)</label>
                        <input type="number" id="prod-preco" step="0.01" min="0" placeholder="Ex: 4899.00" required>
                    </div>

                    <div class="form-group">
                        <label>URL da Imagem</label>
                        <input type="url" id="prod-imagem" placeholder="https://linkdafoto.com/imagem.jpg" required>
                    </div>

                    <button type="submit" class="btn btn-add">Cadastrar na Vitrine 🌙</button>
                </form>
            </div>

            <div class="admin-box">
                <div class="box-title">Gerenciar Estoque Atual</div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Categoria</th>
                                <th>Condição</th>
                                <th>Qtd</th>
                                <th>Preço</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-produtos-corpo">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Segurança Simples para Sessão Administrativa local
        function verificarPermissaoAdmin() {
            const user = JSON.parse(sessionStorage.getItem('nuvee_user'));
            const GMAIL_ADMIN = "bernard141200@gmail.com";
            
            if (!user || user.email.toLowerCase() !== GMAIL_ADMIN.toLowerCase()) {
                alert("Acesso restrito apenas para o administrador da Lua Cell!");
                window.location.replace("./index.html");
            }
        }

        let estoqueLocal = [];

        function puxarDadosDoServidor() {
            fetch('/api/produtos')
                .then(res => res.json())
                .then(dados => {
                    estoqueLocal = dados;
                    renderizarPainel();
                })
                .catch(() => {
                    console.log("Servidor offline, carregando simulador.");
                });
        }

        function renderizarPainel() {
            const tabela = document.getElementById('tabela-produtos-corpo');
            tabela.innerHTML = '';

            let countIphones = 0;
            let countAcessorios = 0;
            let countAlertas = 0;

            estoqueLocal.forEach(p => {
                // Classifica dinamicamente baseado nos nomes/dados cadastrados para alimentar os cards
                const ehIphone = p.nome.toLowerCase().includes('iphone');
                if (ehIphone) countIphones++; else countAcessorios++;
                if (p.quantidade <= 2) countAlertas++;

                // Define a classe de estilo da categoria
                let classeCat = "cat-acessorio";
                let nomeCat = "Acessório";
                if (ehIphone) { classeCat = "cat-iphone"; nomeCat = "iPhone"; }

                tabela.innerHTML += `
                    <tr>
                        <td style="font-weight:700; color:var(--space-dark);">${p.nome}</td>
                        <td><span class="badge-cat ${classeCat}">${nomeCat}</span></td>
                        <td style="color:var(--slate-gray); font-size:13px;">${p.tamanho}</td>
                        <td style="font-weight:700; color:${p.quantidade <= 2 ? '#ef4444' : 'var(--text-main)'}">${p.quantidade} un</td>
                        <td style="font-weight:700; color:var(--accent-blue);">R$ ${p.preco.toFixed(2)}</td>
                        <td class="actions-cell"><button onclick="deletarItem(${p.id})">Excluir</button></td>
                    </tr>
                `;
            });

            document.getElementById('dash-iphones').innerText = countIphones;
            document.getElementById('dash-acessorios').innerText = countAcessorios;
            document.getElementById('dash-alertas').innerText = countAlertas;
        }

        function salvarNovoProduto(e) {
            e.preventDefault();

            const novoItem = {
                id: estoqueLocal.length > 0 ? Math.max(...estoqueLocal.map(p => p.id)) + 1 : 1,
                nome: document.getElementById('prod-nome').value,
                tamanho: document.getElementById('prod-tamanho').value,
                quantidade: parseInt(document.getElementById('prod-qtd').value),
                preco: parseFloat(document.getElementById('prod-preco').value),
                imagem: document.getElementById('prod-imagem').value
            };

            // Envia para o array local e atualiza a tela
            estoqueLocal.push(novoItem);
            
            // Opcional: Aqui você pode fazer um POST para salvar definitivamente no seu servidor Node.js se criar a rota de inserção
            alert("Produto integrado ao catálogo com sucesso!");
            document.getElementById('form-produto').reset();
            renderizarPainel();
        }

        function deletarItem(id) {
            if(confirm("Tem certeza que deseja remover este item da vitrine?")) {
                estoqueLocal = estoqueLocal.filter(p => p.id !== id);
                renderizarPainel();
            }
        }

        // Execuções Iniciais
        verificarPermissaoAdmin();
        puxarDadosDoServidor();
    </script>
</body>
</html>
